# Build, sign, and publish hermes-agent-cn runtime artifacts that the
# hermes-agent-cn-desktop client downloads on first launch.
#
# Trigger: push a tag matching `runtime-v*-cn.*` (e.g. `runtime-v0.14.0-cn.1`).
# Per-platform jobs build a self-contained executable via PyInstaller,
# zip it, sign the manifest with Ed25519, attach all artifacts to a GitHub
# Release, and upload the runtime update feed to the configured Linux server.
#
# Required repository secrets:
#   RUNTIME_SIGN_PRIVATE_KEY_PEM
#     The Ed25519 PEM-encoded private key. The matching public key is
#     baked into the desktop binary via the HERMES_RUNTIME_UPDATE_PUBLIC_KEY_PEM_DEFAULT
#     env var at build time. See docs/RUNTIME_RELEASES.md.
#   LINUX_DEPLOY_KEY
#     SSH private key used to upload runtime artifacts to the public download
#     server. LINUX_DEPLOY_HOST/PORT/USER/PATH can be repository secrets or vars.
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
#     Developer ID Application signing material for macOS runtime payloads.
#
# Caveats (track in follow-up issues, not blockers for first run):
#   - PyInstaller's autodetection misses lazy-imported provider SDKs
#     (firecrawl-py, etc.). Add them to hidden-imports as the ecosystem
#     grows. The agent's `tools/lazy_deps.py` install flow won't work inside
#     a frozen binary anyway — only the providers we pre-bake are usable.
#   - Antivirus on Windows occasionally flags PyInstaller output. Sign
#     the .exe (Authenticode) once you've registered a code-signing cert.
#     Until then, document the false-positive in the release notes.

name: release-runtime

on:
  push:
    tags:
      - "runtime-v*-cn.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Runtime version, e.g. 0.14.0-cn.1"
        required: true
      channel:
        description: "Release channel"
        default: stable
        type: choice
        options: [stable, beta, canary]
      remote_path:
        description: "Linux server download root. Use /www/wwwroot/downloads, or leave empty to use LINUX_DEPLOY_PATH."
        required: false
        default: ""

permissions:
  contents: write  # needed to create the Release + upload assets

env:
  RUNTIME_UPDATE_FEED_BASE_URL: https://ai.fengchiyun.com/downloads/Hermes-CN-Core/runtime

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: win32
            arch: x64
            ext: .exe
          - runner: macos-latest
            platform: darwin
            arch: arm64
            ext: ""
          - runner: macos-15-intel
            platform: darwin
            arch: x64
            ext: ""
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            ext: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve runtime version + channel
        id: meta
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            RUNTIME_VERSION="${{ github.event.inputs.version }}"
            CHANNEL="${{ github.event.inputs.channel }}"
          else
            # Tag is `runtime-v<kernelVersion>-cn.<revision>`; strip the prefix.
            RUNTIME_VERSION="${GITHUB_REF_NAME#runtime-v}"
            CHANNEL="stable"
          fi

          if [[ ! "$RUNTIME_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?)-([a-z][a-z0-9]*)\.([1-9][0-9]*)$ ]]; then
            echo "Invalid runtime version: $RUNTIME_VERSION" >&2
            echo "Expected <kernelVersion>-<flavor>.<revision>, e.g. 0.14.0-cn.1" >&2
            exit 1
          fi

          KERNEL_VERSION="${BASH_REMATCH[1]}"
          RUNTIME_FLAVOR="${BASH_REMATCH[3]}"
          RUNTIME_REVISION="${BASH_REMATCH[4]}"
          PYPROJECT_VERSION="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)"/\1/p' pyproject.toml | head -n 1)"
          if [[ -z "$PYPROJECT_VERSION" ]]; then
            echo "Cannot find [project].version in pyproject.toml" >&2
            exit 1
          fi
          if [[ "$PYPROJECT_VERSION" != "$KERNEL_VERSION" ]]; then
            echo "Tag kernel version $KERNEL_VERSION does not match pyproject.toml version $PYPROJECT_VERSION" >&2
            exit 1
          fi

          echo "runtime_version=$RUNTIME_VERSION" >> "$GITHUB_OUTPUT"
          echo "kernel_version=$KERNEL_VERSION" >> "$GITHUB_OUTPUT"
          echo "runtime_flavor=$RUNTIME_FLAVOR" >> "$GITHUB_OUTPUT"
          echo "runtime_revision=$RUNTIME_REVISION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps + agent
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Install the package plus dashboard extras into the build env so the
          # frozen runtime never tries to lazy-install fastapi/uvicorn on a
          # user's machine.
          # The `cn-desktop` aggregate extra pre-bakes every backend the frozen
          # runtime exposes: dashboard (web), the Anthropic transport (MiniMax-CN
          # rides on Anthropic Messages), the native MCP client (issue #16), and
          # the 飞书 / 钉钉 / 企业微信 / 微信 IM adapters. The frozen binary CANNOT
          # lazy-install via tools/lazy_deps.py (no working pip inside a
          # PyInstaller binary), so anything not bundled here is simply
          # unavailable at runtime — and `pip install <pkg>` on the host does NOT
          # help, since the frozen runtime ships its own interpreter + packages.
          # Keep this in sync with the cn-desktop extra in pyproject.toml.
          pip install -e ".[cn-desktop]"
          # Build tooling
          pip install pyinstaller==6.* cryptography

      - name: Verify platform backends importable (build env)
        shell: bash
        run: |
          # Fail the build BEFORE PyInstaller if the cn-desktop extra is missing
          # a dependency — this is the exact failure mode behind issue #16 (MCP)
          # and the Feishu/DingTalk/WeCom/WeChat desktop reports, where an
          # adapter silently degraded because its SDK was never installed.
          python - <<'PY'
          import importlib, sys
          missing = []
          for m in ("mcp", "lark_oapi", "dingtalk_stream", "alibabacloud_dingtalk",
                    "alibabacloud_tea_openapi", "alibabacloud_tea_util",
                    "aiohttp", "qrcode", "defusedxml", "certifi", "typer"):
              try:
                  importlib.import_module(m)
              except Exception as e:
                  missing.append(f"{m}: {type(e).__name__}: {e}")
          try:
              from cryptography.hazmat.primitives.ciphers import Cipher  # weixin/wecom AES
          except Exception as e:
              missing.append(f"cryptography: {e}")
          import gateway.platforms.feishu as fs
          import gateway.platforms.dingtalk as dt
          import gateway.platforms.wecom_callback as wc
          import gateway.platforms.weixin as wx
          flags = {
              "feishu.FEISHU_AVAILABLE": fs.FEISHU_AVAILABLE,
              "dingtalk.DINGTALK_STREAM_AVAILABLE": dt.DINGTALK_STREAM_AVAILABLE,
              "dingtalk.CARD_SDK_AVAILABLE": dt.CARD_SDK_AVAILABLE,
              "wecom.DEFUSEDXML_AVAILABLE": wc.DEFUSEDXML_AVAILABLE,
              "wecom.AIOHTTP_AVAILABLE": wc.AIOHTTP_AVAILABLE,
              "weixin.AIOHTTP_AVAILABLE": wx.AIOHTTP_AVAILABLE,
              "weixin.CRYPTO_AVAILABLE": wx.CRYPTO_AVAILABLE,
          }
          for k, v in flags.items():
              print(("OK   " if v else "FAIL ") + k)
              if not v:
                  missing.append(f"adapter flag {k} is False")
          if missing:
              print("\n=== build env is missing CN desktop backends ===", *missing, sep="\n")
              sys.exit(1)
          print("\nAll CN desktop platform backends importable in the build env")
          PY

      - name: Build self-contained executable
        shell: bash
        run: |
          # --onedir gives us a folder with shared libs + the binary; the
          # client expects an executable named hermes-agent-cn-runtime-<platform>-<arch>{.ext}.
          # Hidden imports cover modules PyInstaller doesn't discover via
          # static analysis (lazy imports inside hermes_cli/main.py).
          # The cn-desktop runtime cannot lazy-install packages after freezing,
          # so collect both the direct backend packages and the cross-platform
          # transitive SDK packages those backends load dynamically.
          NAME="hermes-agent-cn-runtime-${{ matrix.platform }}-${{ matrix.arch }}"
          pyinstaller --noconfirm \
            --name "$NAME" \
            --onedir \
            --console \
            --collect-submodules hermes_cli \
            --collect-submodules tui_gateway \
            --collect-submodules fastapi \
            --collect-submodules starlette \
            --collect-submodules uvicorn \
            --collect-submodules pydantic \
            --collect-submodules anthropic \
            --collect-submodules mcp \
            --collect-submodules lark_oapi \
            --collect-submodules dingtalk_stream \
            --collect-submodules alibabacloud_dingtalk \
            --collect-submodules alibabacloud_tea_openapi \
            --collect-submodules alibabacloud_tea_util \
            --collect-submodules alibabacloud_endpoint_util \
            --collect-submodules alibabacloud_gateway_dingtalk \
            --collect-submodules alibabacloud_gateway_spi \
            --collect-submodules alibabacloud_credentials \
            --collect-submodules alibabacloud_credentials_api \
            --collect-submodules alibabacloud_openapi_util \
            --collect-submodules Tea \
            --collect-submodules darabonba \
            --collect-submodules requests_toolbelt \
            --collect-submodules aiohttp \
            --collect-submodules websockets \
            --collect-submodules apscheduler \
            --collect-submodules aiofiles \
            --collect-submodules qrcode \
            --collect-submodules png \
            --collect-submodules defusedxml \
            --collect-submodules cryptography \
            --collect-submodules certifi \
            --collect-submodules typer \
            --collect-data hermes_cli \
            --collect-data gateway \
            --collect-data plugins \
            --hidden-import gateway.status \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan.on \
            --copy-metadata fastapi \
            --copy-metadata starlette \
            --copy-metadata uvicorn \
            --copy-metadata pydantic \
            --copy-metadata anthropic \
            --copy-metadata mcp \
            --copy-metadata typer \
            --copy-metadata lark_oapi \
            --copy-metadata dingtalk_stream \
            --copy-metadata alibabacloud_dingtalk \
            --copy-metadata alibabacloud_tea_openapi \
            --copy-metadata alibabacloud_tea_util \
            --copy-metadata alibabacloud_endpoint_util \
            --copy-metadata alibabacloud_gateway_dingtalk \
            --copy-metadata alibabacloud_gateway_spi \
            --copy-metadata alibabacloud_credentials \
            --copy-metadata alibabacloud_credentials_api \
            --copy-metadata alibabacloud_openapi_util \
            --copy-metadata alibabacloud_tea \
            --copy-metadata darabonba_core \
            --copy-metadata requests_toolbelt \
            --copy-metadata aiohttp \
            --copy-metadata websockets \
            --copy-metadata apscheduler \
            --copy-metadata aiofiles \
            --copy-metadata qrcode \
            --copy-metadata pypng \
            --copy-metadata defusedxml \
            --copy-metadata cryptography \
            --copy-metadata pycryptodome \
            --copy-metadata certifi \
            --paths . \
            -p . \
            hermes_cli/main.py
          ls -la "dist/$NAME"

      - name: Normalize macOS framework layout
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          NAME="hermes-agent-cn-runtime-${{ matrix.platform }}-${{ matrix.arch }}"
          python scripts/normalize_macos_pyinstaller_runtime.py "dist/$NAME"

      - name: Prepare macOS signing credentials
        if: matrix.platform == 'darwin'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          test -n "$APPLE_CERTIFICATE"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_SIGNING_IDENTITY"

          signing_keychain_password="$(uuidgen)"
          signing_keychain="$RUNNER_TEMP/hermes-runtime-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/hermes-runtime-apple-certificate.p12"

          security create-keychain -p "$signing_keychain_password" "$signing_keychain"
          security set-keychain-settings -lut 21600 "$signing_keychain"
          security unlock-keychain -p "$signing_keychain_password" "$signing_keychain"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security import "$certificate_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$signing_keychain"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$signing_keychain_password" \
            "$signing_keychain"
          security list-keychains -d user -s "$signing_keychain" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$signing_keychain"

      - name: Sign macOS runtime payload
        if: matrix.platform == 'darwin'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          NAME="hermes-agent-cn-runtime-${{ matrix.platform }}-${{ matrix.arch }}"
          scripts/sign_macos_runtime_payload.sh "dist/$NAME"

      - name: Verify frozen runtime backends
        shell: bash
        run: |
          NAME="hermes-agent-cn-runtime-${{ matrix.platform }}-${{ matrix.arch }}"
          internal="dist/$NAME/_internal"
          # Every backend bundled via the cn-desktop extra must leave its
          # dist-info in the frozen output. A missing one means PyInstaller did
          # not collect the package — the silent-degradation failure mode from
          # issue #16 (MCP) and the 飞书/钉钉/企微/微信 desktop reports, where an
          # adapter quietly fell back to "unavailable" because its SDK never
          # shipped. dist-info names are the normalized (underscored) project
          # names: anthropic, mcp, lark-oapi -> lark_oapi, etc.
          fail=0
          for pkg in anthropic mcp typer lark_oapi dingtalk_stream alibabacloud_dingtalk \
                     alibabacloud_tea_openapi alibabacloud_tea_util \
                     alibabacloud_endpoint_util alibabacloud_gateway_dingtalk \
                     alibabacloud_gateway_spi alibabacloud_credentials \
                     alibabacloud_credentials_api alibabacloud_openapi_util \
                     alibabacloud_tea darabonba_core requests_toolbelt \
                     aiohttp websockets apscheduler aiofiles qrcode pypng \
                     defusedxml cryptography pycryptodome certifi; do
            if [[ -z "$(find "$internal" -maxdepth 1 -type d -name "${pkg}-*.dist-info" -print -quit)" ]]; then
              echo "::error::Frozen runtime is missing ${pkg} package metadata" >&2
              find "dist/$NAME" -maxdepth 3 -type d -iname "${pkg}*" -print >&2
              fail=1
            fi
          done
          [[ "$fail" == 0 ]] || exit 1
          echo "All cn-desktop backends present in the frozen runtime"

      - name: Smoke-test the binary
        shell: bash
        run: |
          NAME="hermes-agent-cn-runtime-${{ matrix.platform }}-${{ matrix.arch }}"
          "./dist/$NAME/$NAME${{ matrix.ext }}" dashboard --help

      - name: Zip artifact
        shell: bash
        run: |
          NAME="hermes-agent-cn-runtime-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p out
          if [[ "${{ matrix.platform }}" == "win32" ]]; then
            # PowerShell Compress-Archive on Windows runner
            powershell -Command "Compress-Archive -Path dist/$NAME/* -DestinationPath out/$NAME.zip -Force"
          elif [[ "${{ matrix.platform }}" == "darwin" ]]; then
            # Preserve framework symlinks. Without -y, Info-ZIP stores the
            # symlink targets as duplicate files and breaks codesign/notary.
            (cd dist && zip -r -y "../out/$NAME.zip" "$NAME")
          else
            (cd dist && zip -r "../out/$NAME.zip" "$NAME")
          fi
          ls -la out

      - name: Sign manifest
        shell: bash
        env:
          RUNTIME_SIGN_PRIVATE_KEY_PEM: ${{ secrets.RUNTIME_SIGN_PRIVATE_KEY_PEM }}
        run: |
          NAME="hermes-agent-cn-runtime-${{ matrix.platform }}-${{ matrix.arch }}"
          # Anticipate the URL the Release will publish at — this has to
          # match exactly because the signature covers it.
          FEED_BASE="${RUNTIME_UPDATE_FEED_BASE_URL%/}"
          URL="${FEED_BASE}/releases/${{ steps.meta.outputs.runtime_version }}/${NAME}.zip"
          python scripts/sign_runtime_manifest.py \
            --channel "${{ steps.meta.outputs.channel }}" \
            --runtime-version "${{ steps.meta.outputs.runtime_version }}" \
            --kernel-version "${{ steps.meta.outputs.kernel_version }}" \
            --runtime-flavor "${{ steps.meta.outputs.runtime_flavor }}" \
            --runtime-revision "${{ steps.meta.outputs.runtime_revision }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --artifact-url "$URL" \
            --artifact-path "out/$NAME.zip" \
            --source-repo "${GITHUB_REPOSITORY}" \
            --source-commit "${GITHUB_SHA}" \
            --output "out/${{ steps.meta.outputs.channel }}-${{ matrix.platform }}-${{ matrix.arch }}.json"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.platform }}-${{ matrix.arch }}
          path: out/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List downloaded
        run: find dist -type f

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # When running via workflow_dispatch there is no tag — skip the
          # release step in that case (still useful for testing the build).
          tag_name: ${{ github.ref_name }}
          files: |
            dist/**/*.zip
            dist/**/*.json
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        if: startsWith(github.ref, 'refs/tags/runtime-v')

      - name: Configure SSH for Linux upload
        env:
          SECRET_LINUX_DEPLOY_HOST: ${{ secrets.LINUX_DEPLOY_HOST }}
          SECRET_LINUX_DEPLOY_PORT: ${{ secrets.LINUX_DEPLOY_PORT }}
          SECRET_LINUX_DEPLOY_USER: ${{ secrets.LINUX_DEPLOY_USER }}
          VAR_LINUX_DEPLOY_HOST: ${{ vars.LINUX_DEPLOY_HOST }}
          VAR_LINUX_DEPLOY_PORT: ${{ vars.LINUX_DEPLOY_PORT }}
          VAR_LINUX_DEPLOY_USER: ${{ vars.LINUX_DEPLOY_USER }}
          LINUX_DEPLOY_KEY: ${{ secrets.LINUX_DEPLOY_KEY }}
          LINUX_DEPLOY_KNOWN_HOSTS: ${{ secrets.LINUX_DEPLOY_KNOWN_HOSTS }}
          SECRET_LINUX_DEPLOY_PATH: ${{ secrets.LINUX_DEPLOY_PATH }}
          VAR_LINUX_DEPLOY_PATH: ${{ vars.LINUX_DEPLOY_PATH }}
          INPUT_REMOTE_PATH: ${{ github.event.inputs.remote_path }}
        shell: bash
        run: |
          set -euo pipefail

          deploy_host="${SECRET_LINUX_DEPLOY_HOST:-${VAR_LINUX_DEPLOY_HOST:-}}"
          deploy_port="${SECRET_LINUX_DEPLOY_PORT:-${VAR_LINUX_DEPLOY_PORT:-22}}"
          deploy_user="${SECRET_LINUX_DEPLOY_USER:-${VAR_LINUX_DEPLOY_USER:-root}}"
          configured_remote_path="${SECRET_LINUX_DEPLOY_PATH:-${VAR_LINUX_DEPLOY_PATH:-}}"
          remote_path="${INPUT_REMOTE_PATH:-$configured_remote_path}"

          if [[ -z "$deploy_host" ]]; then
            deploy_host="43.224.248.112"
          fi
          if [[ -z "${LINUX_DEPLOY_KEY:-}" ]]; then
            echo "Missing Linux upload configuration: secrets.LINUX_DEPLOY_KEY" >&2
            exit 1
          fi
          if [[ -z "$remote_path" ]]; then
            echo "Missing Linux upload configuration: workflow input remote_path, secrets.LINUX_DEPLOY_PATH, or vars.LINUX_DEPLOY_PATH" >&2
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          key_path="$HOME/.ssh/linux_deploy_key"
          printf '%s' "$LINUX_DEPLOY_KEY" | sed 's/\r$//' > "$key_path"
          chmod 600 "$key_path"

          known_hosts_path="$HOME/.ssh/known_hosts"
          if [[ -z "${LINUX_DEPLOY_KNOWN_HOSTS:-}" ]]; then
            touch "$known_hosts_path"
            strict_host_key_checking="accept-new"
          else
            printf '%s' "$LINUX_DEPLOY_KNOWN_HOSTS" | sed 's/\r$//' > "$known_hosts_path"
            strict_host_key_checking="yes"
          fi

          {
            echo "SSH_KEY_PATH=$key_path"
            echo "SSH_KNOWN_HOSTS_PATH=$known_hosts_path"
            echo "SSH_STRICT_HOST_KEY_CHECKING=$strict_host_key_checking"
            echo "LINUX_DEPLOY_HOST=$deploy_host"
            echo "LINUX_DEPLOY_PORT=$deploy_port"
            echo "LINUX_DEPLOY_USER=$deploy_user"
            echo "LINUX_DEPLOY_REMOTE_PATH=${remote_path%/}"
          } >> "$GITHUB_ENV"

      - name: Upload runtime feed to Linux server
        env:
          RUNTIME_VERSION_INPUT: ${{ github.event.inputs.version }}
          CHANNEL_INPUT: ${{ github.event.inputs.channel }}
        shell: bash
        run: |
          set -euo pipefail

          quote_remote_path() {
            python -c 'import shlex, sys; print(shlex.quote(sys.argv[1]))' "$1"
          }

          remote_upload() {
            local file_path="$1"
            local remote_directory="$2"
            local label="$3"
            local attempt=1
            while [[ "$attempt" -le 3 ]]; do
              echo "Uploading $label attempt $attempt/3: $file_path"
              if scp \
                -i "$SSH_KEY_PATH" \
                -P "$LINUX_DEPLOY_PORT" \
                -o "UserKnownHostsFile=$SSH_KNOWN_HOSTS_PATH" \
                -o "StrictHostKeyChecking=$SSH_STRICT_HOST_KEY_CHECKING" \
                -o "ConnectTimeout=30" \
                -o "ServerAliveInterval=30" \
                -o "ServerAliveCountMax=10" \
                "$file_path" "${LINUX_DEPLOY_USER}@${LINUX_DEPLOY_HOST}:${remote_directory}/"; then
                return 0
              fi
              if [[ "$attempt" -eq 3 ]]; then
                echo "Failed to upload $label file after 3 attempts: $file_path" >&2
                return 1
              fi
              sleep $((10 * attempt))
              attempt=$((attempt + 1))
            done
          }

          if [[ -n "${RUNTIME_VERSION_INPUT:-}" ]]; then
            runtime_version="$RUNTIME_VERSION_INPUT"
            channel="${CHANNEL_INPUT:-stable}"
          else
            runtime_version="${GITHUB_REF_NAME#runtime-v}"
            channel="stable"
          fi

          feed_path="$(python - <<'PY'
          import os
          from urllib.parse import urlparse

          print(urlparse(os.environ["RUNTIME_UPDATE_FEED_BASE_URL"]).path.strip("/"))
          PY
          )"
          remote_root="${LINUX_DEPLOY_REMOTE_PATH%/}"
          destination_root="$remote_root"
          if [[ -n "$feed_path" ]]; then
            first_segment="${feed_path%%/*}"
            if [[ "$remote_root" == */"$feed_path" ]]; then
              destination_root="$remote_root"
            elif [[ "$feed_path" == */* && "$(basename "$remote_root")" == "$first_segment" ]]; then
              destination_root="$remote_root/${feed_path#*/}"
            elif [[ "$feed_path" != */* && "$(basename "$remote_root")" == "$feed_path" ]]; then
              destination_root="$remote_root"
            else
              destination_root="$remote_root/$feed_path"
            fi
          fi

          channel_destination="$destination_root/$channel"
          archive_destination="$destination_root/releases/$runtime_version"
          remote="${LINUX_DEPLOY_USER}@${LINUX_DEPLOY_HOST}"
          ssh \
            -i "$SSH_KEY_PATH" \
            -p "$LINUX_DEPLOY_PORT" \
            -o "UserKnownHostsFile=$SSH_KNOWN_HOSTS_PATH" \
            -o "StrictHostKeyChecking=$SSH_STRICT_HOST_KEY_CHECKING" \
            -o "ConnectTimeout=30" \
            -o "ServerAliveInterval=30" \
            -o "ServerAliveCountMax=10" \
            "$remote" "mkdir -p $(quote_remote_path "$channel_destination") $(quote_remote_path "$archive_destination")"

          mapfile -t runtime_files < <(find dist -type f \( -name '*.zip' -o -name '*.json' \) | sort)
          if [[ "${#runtime_files[@]}" -eq 0 ]]; then
            echo "No runtime release files found under dist/" >&2
            exit 1
          fi

          for file in "${runtime_files[@]}"; do
            remote_upload "$file" "$archive_destination" "runtime archive"
            remote_upload "$file" "$channel_destination" "runtime channel"
          done

          echo "Uploaded runtime archive to ${RUNTIME_UPDATE_FEED_BASE_URL%/}/releases/$runtime_version/"
          echo "Uploaded runtime channel manifests to ${RUNTIME_UPDATE_FEED_BASE_URL%/}/$channel/"
